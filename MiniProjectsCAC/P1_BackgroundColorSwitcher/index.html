<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Background Color Switcher</title>

</head>
<body>
    <h1>Background Color Switcher</h1>
    <div id="buttons-div">
        <button class="button" id="grey"></button>
        <button class="button" id="yellow"></button>
        <button class="button" id="green"></button>
        <button class="button" id="blue"></button>
    </div>
    <p>Try to click in one of the colors above to change the background color of the page</p>

    <script src="index.js"></script>
</body>
</html>
